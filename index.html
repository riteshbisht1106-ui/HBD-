<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A Question For You 💕</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Nunito:wght@400;600;800&display=swap"
    rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a0010 0%, #2d0020 50%, #1a0010 100%);
      font-family: 'Nunito', sans-serif;
      overflow: hidden;
      position: relative;
    }

    .heart-float {
      position: fixed;
      bottom: -50px;
      font-size: 1.5rem;
      animation: floatUp linear infinite;
      opacity: 0.12;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(0) rotate(0deg);
        opacity: 0.12;
      }

      100% {
        transform: translateY(-110vh) rotate(360deg);
        opacity: 0;
      }
    }

    /* QUESTION SCREEN */
    #question-screen {
      position: relative;
      z-index: 10;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .question-card {
      background: rgba(255, 255, 255, 0.04);
      border: 1.5px solid rgba(255, 77, 141, 0.3);
      border-radius: 30px;
      padding: 50px 60px;
      backdrop-filter: blur(20px);
      box-shadow: 0 0 60px rgba(255, 77, 141, 0.2), inset 0 0 30px rgba(255, 77, 141, 0.05);
      max-width: 480px;
      width: 90%;
      text-align: center;
      animation: cardIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes cardIn {
      from {
        transform: scale(0.5) translateY(50px);
        opacity: 0;
      }

      to {
        transform: scale(1) translateY(0);
        opacity: 1;
      }
    }

    .emoji-big {
      font-size: 4rem;
      display: block;
      margin-bottom: 10px;
      animation: heartbeat 1.5s ease-in-out infinite;
    }

    @keyframes heartbeat {

      0%,
      100% {
        transform: scale(1);
      }

      25% {
        transform: scale(1.2);
      }

      50% {
        transform: scale(1);
      }

      75% {
        transform: scale(1.15);
      }
    }

    .question-title {
      font-family: 'Dancing Script', cursive;
      font-size: 3.2rem;
      color: #fff;
      line-height: 1.2;
      margin-bottom: 8px;
      text-shadow: 0 0 20px rgba(255, 77, 141, 0.8);
    }

    .question-sub {
      color: rgba(255, 255, 255, 0.45);
      font-size: 0.95rem;
      margin-bottom: 40px;
      letter-spacing: 1px;
    }

    /* YES — stays inside card, always visible */
    #yesBtn {
      background: linear-gradient(135deg, #ff4d8d, #ff1a6e);
      color: #fff;
      border: none;
      padding: 16px 52px;
      font-size: 1.3rem;
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      border-radius: 50px;
      cursor: pointer;
      letter-spacing: 2px;
      box-shadow: 0 8px 30px rgba(255, 26, 110, 0.5);
      transition: transform 0.2s, box-shadow 0.2s;
      display: block;
      margin: 0 auto;
      width: fit-content;
    }

    #yesBtn:hover {
      transform: scale(1.08) translateY(-3px);
      box-shadow: 0 15px 40px rgba(255, 26, 110, 0.7);
    }

    /* NO — fixed, floats freely around screen */
    #noBtn {
      position: fixed;
      background: transparent;
      color: rgba(255, 255, 255, 0.7);
      border: 1.5px solid rgba(255, 255, 255, 0.3);
      padding: 14px 44px;
      font-size: 1.2rem;
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      border-radius: 50px;
      cursor: pointer;
      letter-spacing: 2px;
      white-space: nowrap;
      z-index: 20;
      transition: background 0.15s;
    }

    #noBtn:hover {
      background: rgba(255, 255, 255, 0.06);
    }

    /* Toast */
    .no-toast {
      position: fixed;
      background: rgba(30, 0, 20, 0.92);
      color: #ff4d8d;
      padding: 8px 16px;
      border-radius: 12px;
      font-size: 0.85rem;
      font-weight: 700;
      border: 1px solid rgba(255, 77, 141, 0.35);
      pointer-events: none;
      z-index: 999;
      animation: popMsg 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      white-space: nowrap;
    }

    @keyframes popMsg {
      from {
        transform: scale(0);
        opacity: 0;
      }

      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    /* BIRTHDAY SCREEN */
    #birthday-screen {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
      background: radial-gradient(ellipse at center, #2d0030 0%, #0d000d 100%);
    }

    #birthday-screen.show {
      display: flex;
      animation: screenIn 0.6s ease;
    }

    @keyframes screenIn {
      from {
        opacity: 0;
        transform: scale(0.95);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .bday-content {
      position: relative;
      z-index: 10;
      padding: 20px;
    }

    .bday-emoji-row {
      font-size: 3rem;
      margin-bottom: 20px;
      display: flex;
      gap: 15px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .bday-emoji-row span {
      display: inline-block;
      animation: bounce 0.6s ease infinite alternate;
    }

    .bday-emoji-row span:nth-child(1) {
      animation-delay: 0.0s;
    }

    .bday-emoji-row span:nth-child(2) {
      animation-delay: 0.1s;
    }

    .bday-emoji-row span:nth-child(3) {
      animation-delay: 0.2s;
    }

    .bday-emoji-row span:nth-child(4) {
      animation-delay: 0.3s;
    }

    .bday-emoji-row span:nth-child(5) {
      animation-delay: 0.4s;
    }

    @keyframes bounce {
      from {
        transform: translateY(0) rotate(-5deg);
      }

      to {
        transform: translateY(-15px) rotate(5deg);
      }
    }

    .bday-title {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(3rem, 10vw, 6rem);
      background: linear-gradient(135deg, #ffd700, #ff4d8d, #ff69b4, #ffd700);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: gradientShift 2s ease infinite, titleIn 1s cubic-bezier(0.34, 1.56, 0.64, 1);
      line-height: 1.1;
      margin-bottom: 10px;
    }

    @keyframes gradientShift {

      0%,
      100% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }
    }

    @keyframes titleIn {
      from {
        transform: scale(0) rotate(-10deg);
        opacity: 0;
      }

      to {
        transform: scale(1) rotate(0deg);
        opacity: 1;
      }
    }

    .bday-name {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(2rem, 7vw, 4rem);
      color: #fff;
      text-shadow: 0 0 30px rgba(255, 215, 0, 0.8), 0 0 60px rgba(255, 77, 141, 0.5);
      margin-bottom: 20px;
      animation: glowPulse 2s ease-in-out infinite;
    }

    @keyframes glowPulse {

      0%,
      100% {
        text-shadow: 0 0 30px rgba(255, 215, 0, 0.8), 0 0 60px rgba(255, 77, 141, 0.5);
      }

      50% {
        text-shadow: 0 0 50px rgba(255, 215, 0, 1.0), 0 0 100px rgba(255, 77, 141, 0.8);
      }
    }

    .bday-msg {
      color: rgba(255, 255, 255, 0.75);
      font-size: 1.1rem;
      max-width: 400px;
      margin: 0 auto 30px;
      line-height: 1.7;
      animation: fadeUp 0.8s ease 0.5s both;
    }

    .bday-hearts {
      font-size: 2rem;
      animation: fadeUp 0.8s ease 0.8s both;
      letter-spacing: 8px;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    #fireworks-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 150;
    }

    .confetti-piece {
      position: fixed;
      top: -20px;
      animation: confettiFall linear forwards;
      z-index: 8;
      border-radius: 2px;
      pointer-events: none;
    }

    @keyframes confettiFall {
      0% {
        transform: translateY(0) rotate(0deg);
        opacity: 1;
      }

      100% {
        transform: translateY(110vh) rotate(720deg);
        opacity: 0;
      }
    }
  </style>
</head>

<body>

  <canvas id="fireworks-canvas"></canvas>

  <!-- QUESTION SCREEN -->
  <div id="question-screen">
    <div class="question-card">
      <span class="emoji-big">💕</span>
      <h1 class="question-title">Do you love me?</h1>
      <p class="question-sub">NO bola to pitti pitti ho jaegi 🥺</p>
      <button id="yesBtn" onclick="onYes()">Yes 💖</button>
    </div>
  </div>

  <!-- NO button floats freely outside the card -->
  <button id="noBtn" onclick="onNo()">No 🙃</button>

  <!-- BIRTHDAY SCREEN -->
  <div id="birthday-screen">
    <div class="bday-content">
      <div class="bday-emoji-row">
        <span>🎂</span><span>🎉</span><span>🥳</span><span>🎊</span><span>🎈</span>
      </div>
      <div class="bday-title">Happy Birthday!</div>
      <div class="bday-name">💕 Mera Babu 💕</div>
      <p class="bday-msg">
        Tu meri zindagi ki sabse khoobsurat gift hai.<br>
        bhut saari khushiyan aur pyaar hamari trf se meri babu ko 😁 🌸 . Thank you so much for making my life more beautiful 🌸. 
      </p>
      <div class="bday-hearts">💖 💗 💓 💞 💕</div>
    </div>
  </div>

  <script>
    /* Floating hearts */
    const heartEmojis = ['💕', '💗', '💖', '❤️', '🌸', '✨', '💫'];
    for (let i = 0; i < 22; i++) {
      const h = document.createElement('div');
      h.className = 'heart-float';
      h.textContent = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
      h.style.left = Math.random() * 100 + 'vw';
      h.style.fontSize = (1 + Math.random() * 1.5) + 'rem';
      h.style.animationDuration = (8 + Math.random() * 10) + 's';
      h.style.animationDelay = (Math.random() * 10) + 's';
      document.body.appendChild(h);
    }

    /* Place No button initially — bottom-right */
    const noBtn = document.getElementById('noBtn');
    function placeInitial() {
      const bw = noBtn.offsetWidth || 150;
      const bh = noBtn.offsetHeight || 55;
      noBtn.style.left = (window.innerWidth - bw - 60) + 'px';
      noBtn.style.top = (window.innerHeight - bh - 60) + 'px';
    }
    window.addEventListener('load', placeInitial);
    setTimeout(placeInitial, 80);

    /* No messages */
    const noMessages = [
      "Galat jawab! 😤", "pitti pitti ho jaegi 😜", "Nahi nahi nahi! 🙈",
      "chl chl ab bol b de 😏", "Sach bol! 🥺", "aau whi 😤",
      "ab meko gussa aa rha 🚫", "fir se soch le 😝", "Dobara socho! 💭",
      "chl last try 😂", "HMMMMM😤🏃", " 💅"
    ];
    let noCount = 0;

    function onNo() {
      noCount++;
      const bw = noBtn.offsetWidth || 150;
      const bh = noBtn.offsetHeight || 55;
      const pad = 20;
      const cx = parseFloat(noBtn.style.left) || 0;
      const cy = parseFloat(noBtn.style.top) || 0;

      let nx, ny, tries = 0;
      do {
        nx = pad + Math.random() * (window.innerWidth - bw - pad * 2);
        ny = pad + Math.random() * (window.innerHeight - bh - pad * 2);
        tries++;
      } while (tries < 20 && Math.hypot(nx - cx, ny - cy) < 160);

      noBtn.style.left = nx + 'px';
      noBtn.style.top = ny + 'px';

      /* Toast */
      const msg = document.createElement('div');
      msg.className = 'no-toast';
      msg.textContent = noMessages[noCount % noMessages.length];
      msg.style.left = Math.min(nx, window.innerWidth - 190) + 'px';
      msg.style.top = Math.max(ny - 45, 10) + 'px';
      document.body.appendChild(msg);
      setTimeout(() => msg.remove(), 1400);

      /* Yes button grows a little each time */
      const scale = Math.min(1 + noCount * 0.04, 1.5);
      document.getElementById('yesBtn').style.transform = `scale(${scale})`;
    }

    /* Yes */
    function onYes() {
      document.getElementById('question-screen').style.display = 'none';
      noBtn.style.display = 'none';
      document.getElementById('birthday-screen').classList.add('show');
      startFireworks();
      startConfetti();
    }

    /* Fireworks */
    const canvas = document.getElementById('fireworks-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [], animId, launchInterval;

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    const fwColors = ['#ff4d8d', '#ffd700', '#ff69b4', '#00eaff', '#ff1a6e', '#fff', '#a78bfa', '#34d399'];

    function launchFirework() {
      const x = 80 + Math.random() * (canvas.width - 160);
      const y = 60 + Math.random() * (canvas.height * 0.55);
      const color = fwColors[Math.floor(Math.random() * fwColors.length)];
      const count = 60 + Math.floor(Math.random() * 40);
      for (let i = 0; i < count; i++) {
        const angle = (Math.PI * 2 / count) * i;
        const speed = 2 + Math.random() * 5;
        particles.push({
          x, y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          alpha: 1, color,
          size: 2 + Math.random() * 2,
          decay: 0.012 + Math.random() * 0.01,
          gravity: 0.05
        });
      }
    }

    function animateFireworks() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (const p of particles) {
        p.x += p.vx; p.y += p.vy;
        p.vy += p.gravity;
        p.vx *= 0.98; p.vy *= 0.98;
        p.alpha -= p.decay;
        ctx.globalAlpha = Math.max(0, p.alpha);
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      particles = particles.filter(p => p.alpha > 0);
      animId = requestAnimationFrame(animateFireworks);
    }

    function startFireworks() {
      animateFireworks();
      launchFirework(); launchFirework(); launchFirework();
      launchInterval = setInterval(() => {
        const n = 1 + Math.floor(Math.random() * 4);
        for (let i = 0; i < n; i++) {
          setTimeout(launchFirework, Math.random() * 400);
        }
      }, 600);
    }
    function stopFireworks() { clearInterval(launchInterval); }

    /* Confetti */
    const cColors = ['#ff4d8d', '#ffd700', '#ff69b4', '#00eaff', '#a78bfa', '#fff', '#ff6b35', '#34d399'];
    function startConfetti() {
      setInterval(() => {
        spawnConfetti();
      }, 100);
    }
    function spawnConfetti() {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.left = Math.random() * 100 + 'vw';
      el.style.background = cColors[Math.floor(Math.random() * cColors.length)];
      el.style.width = (6 + Math.random() * 8) + 'px';
      el.style.height = (6 + Math.random() * 8) + 'px';
      el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      el.style.animationDuration = (3 + Math.random() * 3) + 's';
      el.style.animationDelay = Math.random() * 0.3 + 's';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 7000);
    }
  </script>
</body>

</html>
